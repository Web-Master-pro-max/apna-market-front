<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Your Cart — Apna Market</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg,#008C8C 0%, #FFF8E7 100%);
      min-height: 100vh;
      color: #0f172a;
      padding-bottom: 70px;
    }

    @media (min-width: 900px) {
      body {
        padding-bottom: 0;
      }
    }

    
    .glass-nav {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    @media (min-width: 768px) {
      .glass-nav {
        padding: 0.8rem 2rem;
      }
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(125deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      cursor: pointer;
    }

    @media (min-width: 768px) {
      .brand {
        font-size: 1.5rem;
        gap: 12px;
      }

    .brand i {
      background: none;
      -webkit-background-clip: unset;
      color: #008C8C;

    .nav-links-modern {
      display: flex;
      gap: 1rem;
      list-style: none;
      flex-wrap: wrap;
    }

    @media (min-width: 768px) {
      .nav-links-modern {

    .bottom-nav-item {

      gap: 4px;

      border: none;

    }

    }

    @media (min-width: 768px) {

    }

    }

      }

    .cart-badge {

    }

    @media (min-width: 768px) {

      }
    }

    
    .filter-bar {
      background: white;
      border-radius: 1rem;
      padding: 0.8rem;

      display: flex;
      flex-wrap: wrap;

      }

    .filter-group {

    .filter-chip {
      background: #f1f5f9;

      padding: 0.4rem 1rem;

      font-weight: 500;
      cursor: pointer;

      display: flex;

    @media (min-width: 768px) {

    .reset-cart {

    }

    @media (max-width: 900px) {

<script src="cart.js"></script>
<script>
  
  
  
  const API_URL = `${window.location.protocol}//${window.location.hostname}:${window.location.port}/api`;
  let token = localStorage.getItem('token');
  let currentUser = localStorage.getItem('user') ? JSON.parse(localStorage.getItem('user')) : null;

  function ensureAuth(redirect = 'login.html') {
    if (!token || !currentUser) {
      window.location.href = redirect;
      return false;
    }
    return true;
  }

  function setUserUI() {
    const profileLink = document.getElementById('navProfile');
    const sellerLink = document.getElementById('navSeller');
    const loginLink = document.getElementById('navLogin');
    if (currentUser) {
      if (profileLink) profileLink.style.display = 'inline-block';
      if (sellerLink) sellerLink.style.display = currentUser.role === 'seller' ? 'inline-block' : 'none';
      if (loginLink) loginLink.style.display = 'none';
    } else {
      if (profileLink) profileLink.style.display = 'none';
      if (sellerLink) sellerLink.style.display = 'none';
      if (loginLink) loginLink.style.display = 'inline-block';
    }
  }

  async function fetchJSON(url, options = {}) {
    const response = await fetch(url, options);
    const json = await response.json().catch(() => null);
    if (!response.ok) throw new Error((json && json.message) || response.statusText || 'Request failed');
    return json;
  }

  
  function getCart() {
    const cart = localStorage.getItem('apnaCart');
    if (cart) return JSON.parse(cart);
    return { items: [] };
  }

  function saveCart(cart) {
    localStorage.setItem('apnaCart', JSON.stringify(cart));
  }

  
  let allCartItems = [];
  let currentFilter = 'all';
  let currentSort = null;

  async function loadCartPage() {
    if (!ensureAuth()) return;
    setUserUI();

    const cart = getCart();
    if (!cart.items.length) {
      renderEmptyCart();
      return;
    }

    
    const rows = await Promise.all(cart.items.map(async (item) => {
      try {
        const product = await fetchJSON(`${API_URL}/products/${item.productId}`);
        return { product, quantity: item.quantity };
      } catch (err) {
        return { product: null, quantity: item.quantity, id: item.productId };
      }
    }));

    allCartItems = rows.filter(row => row.product && row.product.id);
    if (!allCartItems.length) {
      renderEmptyCart(true);
      return;
    }

    applyFiltersAndRender();
  }

  function applyFiltersAndRender() {
    let filtered = [...allCartItems];
    
    
    if (currentFilter !== 'all') {
      filtered = filtered.filter(item => {
        const category = (item.product.category || '').toLowerCase();
        if (currentFilter === 'electronics') return category.includes('electronic') || category === 'electronics';
        if (currentFilter === 'fashion') return category.includes('fashion') || category.includes('clothing');
        if (currentFilter === 'home') return category.includes('home') || category.includes('furniture');
        return true;
      });
    }
    
    
    if (currentSort === 'price_asc') {
      filtered.sort((a, b) => (a.product.price || 0) - (b.product.price || 0));
    } else if (currentSort === 'price_desc') {
      filtered.sort((a, b) => (b.product.price || 0) - (a.product.price || 0));
    }
    
    renderCartItems(filtered);
    renderSummary(filtered);
    updateItemCount(filtered);
  }

  function renderCartItems(items) {
    const cartSection = document.getElementById('cartSection');
    if (!items.length) {
      cartSection.innerHTML = `
        <div class="cart-empty">
          <i class="fas fa-filter"></i>
          <h3>No items match filter</h3>
          <p>Try changing the filter or clear all filters</p>
          <button class="shop-now-btn" onclick="resetFilter()">Show All Items</button>
        </div>
      `;
      return;
    }

    cartSection.innerHTML = `
      <div class="cart-items-header">
        <span>Product</span>
        <span style="text-align:right;">Quantity</span>
      </div>
      ${items.map(row => {
        const product = row.product;
        const price = Number(product.price || 0).toLocaleString('en-IN');
        const category = product.category || 'General';
        let categoryIcon = 'fa-tag';
        if (category.toLowerCase().includes('electronic')) categoryIcon = 'fa-tv';
        else if (category.toLowerCase().includes('fashion')) categoryIcon = 'fa-tshirt';
        else if (category.toLowerCase().includes('home')) categoryIcon = 'fa-home';
        
        return `
          <div class="cart-item">
            <div class="cart-item-image">
              <i class="fas ${categoryIcon}"></i>
            </div>
            <div class="cart-item-info">
              <h3>${escapeHtml(product.name)}</h3>
              <div class="seller"><i class="fas fa-store"></i> ${escapeHtml(product.seller?.storeName || product.seller?.name || 'Seller')}</div>
              <div class="price">₹${price}</div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem;">
              <div class="quantity-control">
                <button onclick="updateCartQuantity(${product.id}, ${row.quantity - 1})"><i class="fas fa-minus"></i></button>
                <input type="number" min="1" value="${row.quantity}" readonly style="pointer-events: none;">
                <button onclick="updateCartQuantity(${product.id}, ${row.quantity + 1})"><i class="fas fa-plus"></i></button>
              </div>
              <button class="remove-btn" onclick="removeFromCart(${product.id})"><i class="fas fa-trash-alt"></i> Remove</button>
            </div>
          </div>
        `;
      }).join('')}
    `;
  }

  function renderSummary(items) {
    const summaryCard = document.getElementById('summaryCard');
    const total = items.reduce((sum, row) => sum + Number(row.product.price || 0) * row.quantity, 0);
    const itemCount = items.reduce((sum, row) => sum + row.quantity, 0);
    const deliveryCharge = total > 500 ? 0 : 40;
    const grandTotal = total + deliveryCharge;
    
    summaryCard.innerHTML = `
      <h2><i class="fas fa-receipt"></i> Order Summary</h2>
      <div class="summary-row">
        <span>Subtotal (${itemCount} items)</span>
        <span>₹${total.toLocaleString('en-IN')}</span>
      </div>
      <div class="summary-row">
        <span>Delivery Fee</span>
        <span>${deliveryCharge === 0 ? 'FREE' : '₹' + deliveryCharge}</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span>₹${grandTotal.toLocaleString('en-IN')}</span>
      </div>
      <button class="checkout-button" id="checkoutBtn"><i class="fas fa-credit-card"></i> Proceed to Checkout</button>
      <div style="font-size: 0.65rem; text-align: center; margin-top: 0.8rem; color: #5b6e8c;">
        <i class="fas fa-shield-alt"></i> Secure checkout • Free delivery above ₹500
      </div>
    `;
    document.getElementById('checkoutBtn')?.addEventListener('click', () => {
      window.location.href = 'checkout.html';
    });
  }

  function updateItemCount(items) {
    const count = items.reduce((sum, row) => sum + row.quantity, 0);
    document.getElementById('itemCountSpan').innerText = count;
  }

  function renderEmptyCart(isError = false) {
    const cartSection = document.getElementById('cartSection');
    const summaryCard = document.getElementById('summaryCard');
    cartSection.innerHTML = `
      <div class="cart-empty">
        <i class="fas fa-shopping-cart"></i>
        <h3>Your cart is empty</h3>
        <p>Looks like you haven't added anything yet.</p>
        <button class="shop-now-btn" onclick="window.location.href='products.html'"><i class="fas fa-store"></i> Start Shopping</button>
      </div>
    `;
    summaryCard.innerHTML = `
      <h2><i class="fas fa-receipt"></i> Order Summary</h2>
      <div style="text-align:center; padding:1.5rem 0;">
        <i class="fas fa-box-open" style="font-size:2rem; color:#cbd5e1;"></i>
        <p style="margin-top:0.5rem; color:#475569; font-size:0.8rem;">Add items to see total</p>
      </div>
    `;
    document.getElementById('itemCountSpan').innerText = "0";
  }

  
  function updateCartQuantity(productId, quantity) {
    const cart = getCart();
    const itemIndex = cart.items.findIndex(i => i.productId == productId);
    if (itemIndex !== -1) {
      if (quantity <= 0) {
        cart.items.splice(itemIndex, 1);
      } else {
        cart.items[itemIndex].quantity = Math.min(99, Math.max(1, quantity));
      }
      saveCart(cart);
      showToast(quantity > 0 ? "Cart updated" : "Item removed", false);
      loadCartPage();
    }
  }

  function removeFromCart(productId) {
    const cart = getCart();
    cart.items = cart.items.filter(i => i.productId != productId);
    saveCart(cart);
    showToast("Item removed", false);
    loadCartPage();
  }

  function clearCart() {
    if (confirm('Clear your entire cart?')) {
      localStorage.setItem('apnaCart', JSON.stringify({ items: [] }));
      showToast("Cart cleared", false);
      loadCartPage();
    }
  }

  function resetFilter() {
    currentFilter = 'all';
    currentSort = null;
    document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
    document.querySelector('.filter-chip[data-filter="all"]')?.classList.add('active');
    applyFiltersAndRender();
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.style.backgroundColor = isError ? '#b91c1c' : '#0f172a';
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2500);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  
  function setupFilters() {
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.getAttribute('data-filter');
        applyFiltersAndRender();
      });
    });
    document.getElementById('resetCartBtn')?.addEventListener('click', clearCart);
  }

  
  window.updateCartQuantity = updateCartQuantity;
  window.removeFromCart = removeFromCart;
  window.clearCart = clearCart;
  window.resetFilter = resetFilter;

  document.addEventListener('DOMContentLoaded', () => {
    loadCartPage();
    setupFilters();
  });
</script>
</body>
</html>
